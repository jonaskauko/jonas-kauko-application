<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --polar:  #2d3040;
            --autumn: #261a46;
            --blue:   #655bb0;
            --black:  #1e1f2c;
            --white:  #ffffff;
            --muted:  #9891bb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Sharp Sans Display No1', 'Space Grotesk', Arial, sans-serif;
            background: var(--black);
        }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
        }

        /* ── LEFT NAV ── */
        .nav {
            background: var(--polar);
            display: flex;
            flex-direction: column;
            padding: 40px 0;
            border-right: 1px solid rgba(255,255,255,0.07);
        }

        .nav-identity {
            padding: 0 32px 36px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .nav-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .nav-role {
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin-top: 7px;
        }

        .nav-subtitle {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.4;
        }

        .nav-section-label {
            font-size: 0.58rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: rgba(255,255,255,0.25);
            padding: 28px 32px 12px;
        }

        .nav-items {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: flex-start;
            gap: 0;
            padding: 12px 32px;
            cursor: pointer;
            position: relative;
            border-left: 3px solid transparent;
            transition: background 0.15s, border-color 0.15s;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.04);
        }

        .nav-item.active {
            background: rgba(101,91,176,0.12);
            border-left-color: var(--blue);
        }

        .nav-item-inner { width: 100%; }

        .nav-item-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255,255,255,0.45);
            line-height: 1.2;
            transition: color 0.15s;
        }

        .nav-item:hover .nav-item-title {
            color: rgba(255,255,255,0.75);
        }

        .nav-item.active .nav-item-title {
            color: var(--white);
        }

        .nav-item-desc {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.2);
            margin-top: 2px;
            transition: color 0.15s;
        }

        .nav-item:hover .nav-item-desc {
            color: rgba(255,255,255,0.35);
        }

        .nav-item.active .nav-item-desc {
            color: var(--muted);
        }

        .nav-footer {
            padding: 24px 32px 0;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .nav-footer-email {
            font-size: 0.72rem;
            color: var(--muted);
            line-height: 1.6;
        }

        .nav-footer-loc {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            margin-top: 2px;
        }

        .print-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-top: 20px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
            font-size: 0.72rem;
            font-weight: 500;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.04em;
            transition: color 0.15s;
        }

        .print-btn:hover { color: var(--muted); }

        @media print {
            .nav { display: none; }
            .layout { grid-template-columns: 1fr; }
            .canvas-footer { display: none; }
        }

        /* Decorative marker accent */
        .nav-marker {
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.05;
        }

        /* ── CONTENT FRAME ── */
        .frame-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            background: #e8e7f0;
        }

        .doc-frame {
            flex: 1;
            min-height: 0;
            border: none;
            display: block;
        }

        .canvas-footer {
            position: absolute;
            bottom: 28px;
            right: 36px;
        }

        .canvas-footer-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            color: rgba(45,48,64,0.3);
            cursor: pointer;
            transition: color 0.15s;
            letter-spacing: 0.02em;
            user-select: none;
        }

        .canvas-footer-link:hover { color: var(--blue); }
        .canvas-footer-link svg { transition: transform 0.15s; }
        .canvas-footer-link:hover svg { transform: translateX(3px); }

        .mobile-cl-link { display: none; }

        /* Empty state */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.15);
            font-size: 0.85rem;
            gap: 12px;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            html, body { overflow: auto; }

            .layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                height: auto;
                min-height: 100vh;
            }

            .nav {
                padding: 36px 0 28px;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.08);
            }

            .nav-identity { padding: 0 28px 28px; }

            .nav-name { font-size: 1.5rem; }

            .nav-section-label { padding: 24px 28px 10px; }

            .nav-item { padding: 14px 28px; }

            .nav-item-title { font-size: 1rem; }

            .nav-item-desc { font-size: 0.74rem; }

            .nav-footer { padding: 20px 28px 0; }

            .nav-marker { display: none; }

            /* On mobile: no iframe, nav items are full-page links */
            .frame-wrap { display: none; }

            .mobile-cl-link {
                display: flex;
                justify-content: center;
                padding: 20px 28px 8px;
            }
        }
    </style>
</head>
<body>
<div class="layout">

    <!-- ── LEFT NAV ── -->
    <nav class="nav">

        <div class="nav-identity">
            <div class="nav-name">Job Application<br>Portfolio</div>
            <div class="nav-footer-email" style="margin-top:10px;">jonas.kauko@gmail.com</div>
            <div class="nav-footer-loc">Espoo, Finland</div>
        </div>

        <div class="nav-section-label">Documents</div>

        <div class="nav-items" id="navItems"></div>

        <div class="mobile-cl-link" id="mobileCl" style="display:none">
            <span class="canvas-footer-link" onclick="loadCoverLetter()">
                Cover Letter
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2.5 7h9M8 3.5l3.5 3.5L8 10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </div>

        <!-- Matrix Marker decoration -->
        <svg class="nav-marker" width="120" height="120" viewBox="0 0 120 120" fill="none">
            <rect x="60" y="8" width="74" height="74" rx="3"
                  transform="rotate(45 60 60)" stroke="white" stroke-width="1"/>
            <rect x="60" y="26" width="48" height="48" rx="2"
                  transform="rotate(45 60 60)" stroke="white" stroke-width="1"/>
        </svg>

        <div class="nav-footer">
            <button class="print-btn" onclick="window.print()">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <rect x="2" y="4.5" width="9" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
                    <path d="M4 4.5V2.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v2" stroke="currentColor" stroke-width="1.2"/>
                    <path d="M4 8.5h5M4 10.5h3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
                </svg>
                Print / Save PDF
            </button>
        </div>

    </nav>

    <!-- ── IFRAME ── -->
    <div class="frame-wrap">
        <iframe class="doc-frame" id="docFrame" src="cv.html"></iframe>
        <div class="canvas-footer" id="canvasFooter">
            <span class="canvas-footer-link" onclick="loadCoverLetter()">
                Cover Letter
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2.5 7h9M8 3.5l3.5 3.5L8 10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </div>
    </div>

</div>

<script>
    // ── Tab config — set hidden: true to hide a tab ──────────────────
    const TABS = [
        { title: 'Curriculum Vitae',  desc: 'Experience, skills & education', src: 'cv.html',            hidden: false },
        { title: 'Cover Letter',      desc: 'Application letter',              src: 'cover-letter.html',  hidden: false },
        { title: 'Projects',          desc: 'Selected work projects',          src: 'projects.html',      hidden: true },
        { title: 'About Me',          desc: 'Background & interests',          src: 'about.html',         hidden: false },
    ];
    // ─────────────────────────────────────────────────────────────────

    const visible = TABS.filter(t => !t.hidden);

    // Build nav items
    const navItems = document.getElementById('navItems');
    visible.forEach((tab, i) => {
        const el = document.createElement('div');
        el.className = 'nav-item' + (i === 0 ? ' active' : '');
        el.dataset.src = tab.src;
        el.onclick = function () { load(this); };
        el.innerHTML = `<div class="nav-item-inner">
            <div class="nav-item-title">${tab.title}</div>
            <div class="nav-item-desc">${tab.desc}</div>
        </div>`;
        navItems.appendChild(el);
    });

    // Show mobile cover letter link if cover letter tab is visible
    if (visible.find(t => t.src === 'cover-letter.html')) {
        document.getElementById('mobileCl').style.display = '';
    }

    // Load first tab
    if (visible.length) {
        document.getElementById('docFrame').src = visible[0].src;
    }

    function load(el) {
        if (window.innerWidth <= 768) {
            window.open(el.dataset.src, '_blank');
            return;
        }
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('docFrame').src = el.dataset.src;
        document.getElementById('canvasFooter').style.display =
            el.dataset.src === 'cv.html' ? '' : 'none';
    }

    function loadCoverLetter() {
        const el = document.querySelector('[data-src="cover-letter.html"]');
        if (el) load(el);
    }
</script>
</body>
</html>
