<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonas Kauko — Application Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:   #0A0F1E;
            --blue:   #1B6EF3;
            --blue-d: #1558D0;
            --white:  #ffffff;
            --surface:#F7F9FC;
            --border: #E2E8F0;
            --muted:  #94A3B8;
            --text:   #0A0F1E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', Arial, sans-serif;
            background: var(--surface);
        }

        .layout {
            display: grid;
            grid-template-columns: 272px 1fr;
            height: 100vh;
        }

        /* ── LEFT NAV ── */
        .nav {
            background: var(--navy);
            display: flex;
            flex-direction: column;
            padding: 40px 0;
            border-right: none;
        }

        .nav-identity {
            padding: 0 32px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .nav-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.025em;
            line-height: 1.15;
        }

        .nav-badge {
            display: inline-block;
            margin-top: 12px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--navy);
            background: var(--blue);
            padding: 3px 10px;
            border-radius: 4px;
        }

        .nav-subtitle {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.35);
            margin-top: 8px;
            line-height: 1.5;
        }

        .nav-section-label {
            font-size: 0.58rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: rgba(255,255,255,0.2);
            padding: 28px 32px 10px;
        }

        .nav-items { flex: 1; }

        .nav-item {
            padding: 11px 32px;
            cursor: pointer;
            position: relative;
            border-left: 2px solid transparent;
            transition: background 0.12s, border-color 0.12s;
        }

        .nav-item:hover { background: rgba(255,255,255,0.04); }

        .nav-item.active {
            background: rgba(27,110,243,0.12);
            border-left-color: var(--blue);
        }

        .nav-item-title {
            font-size: 0.88rem;
            font-weight: 500;
            color: rgba(255,255,255,0.4);
            line-height: 1.3;
            transition: color 0.12s;
        }

        .nav-item:hover .nav-item-title { color: rgba(255,255,255,0.7); }
        .nav-item.active .nav-item-title { color: var(--white); font-weight: 600; }

        .nav-item-desc {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.18);
            margin-top: 2px;
            transition: color 0.12s;
        }

        .nav-item:hover .nav-item-desc { color: rgba(255,255,255,0.3); }
        .nav-item.active .nav-item-desc { color: rgba(255,255,255,0.4); }

        .nav-footer {
            padding: 24px 32px 0;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .nav-footer-email {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.35);
            line-height: 1.7;
        }

        .nav-footer-loc {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.18);
        }

        /* ── FRAME ── */
        .frame-wrap {
            background: var(--surface);
            position: relative;
        }

        .doc-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            html, body { overflow: auto; }

            .layout {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
            }

            .nav {
                padding: 32px 0 24px;
                border-bottom: 1px solid rgba(255,255,255,0.07);
            }

            .nav-identity { padding: 0 24px 24px; }
            .nav-name { font-size: 1.5rem; }
            .nav-section-label { padding: 22px 24px 10px; }
            .nav-item { padding: 13px 24px; }
            .nav-item-title { font-size: 1rem; }
            .nav-item-desc { font-size: 0.74rem; }
            .nav-footer { padding: 20px 24px 0; }
            .frame-wrap { display: none; }
        }
    </style>
</head>
<body>
<div class="layout">

    <nav class="nav">
        <div class="nav-identity">
            <div class="nav-name">Jonas Kauko</div>
            <div class="nav-badge">Product Manager Application</div>
            <div class="nav-subtitle">Software Intelligence · Matrix42</div>
        </div>

        <div class="nav-section-label">Documents</div>

        <div class="nav-items">
            <div class="nav-item active" data-src="cv.html" onclick="load(this)">
                <div class="nav-item-title">Curriculum Vitae</div>
                <div class="nav-item-desc">Experience, skills &amp; education</div>
            </div>
            <div class="nav-item" data-src="cover-letter.html" onclick="load(this)">
                <div class="nav-item-title">Cover Letter</div>
                <div class="nav-item-desc">Application letter</div>
            </div>
        </div>

        <div class="nav-footer">
            <div class="nav-footer-email">jonas.kauko@matrix42.com</div>
            <div class="nav-footer-loc">Espoo, Finland</div>
        </div>
    </nav>

    <div class="frame-wrap">
        <iframe class="doc-frame" id="docFrame" src="cv.html"></iframe>
    </div>

</div>
<script>
    function load(el) {
        if (window.innerWidth <= 768) { window.open(el.dataset.src, '_blank'); return; }
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('docFrame').src = el.dataset.src;
    }
</script>
</body>
</html>
