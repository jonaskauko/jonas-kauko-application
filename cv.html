<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonas Kauko — Curriculum Vitae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark:         #2d3040;
            --mid:          #261a46;
            --accent:       #655bb0;
            --accent-dim:   #261a46;
            --accent-light: #9891bb;
            --white:      #ffffff;
            --offwhite:   #eeedf5;
            --text:       #1a1b2e;
            --muted:      #64748b;
            --border:     #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sharp Sans Display No1', 'Space Grotesk', 'Inter', Arial, sans-serif;
            background: #e8e7f0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .page {
            max-width: 1050px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 360px 1fr;
            box-shadow: 0 24px 80px rgba(0,0,0,0.2);
        }

        /* ── SIDEBAR ── */
        .sidebar {
            background: var(--dark);
            color: var(--white);
            display: flex;
            flex-direction: column;
        }

        .photo-wrap {
            position: relative;
            height: 230px;
            overflow: hidden;
        }

        .photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 18%;
        }

        .photo-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(45,48,64,0) 60%,
                rgba(45,48,64,0.85) 85%,
                rgba(45,48,64,1) 100%
            );
        }

        .identity {
            padding: 0 32px 24px;
            margin-top: -48px;
            position: relative;
            z-index: 1;
            position: relative;
            z-index: 1;
        }

        .identity h1 {
            font-size: 2.1rem;
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        .identity .role {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-top: 8px;
        }

        .sidebar-body {
            padding: 4px 32px 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 26px;
        }

        .s-section-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(152,145,187,0.3);
            margin-bottom: 12px;
        }

        .contact-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .contact-row:last-child { margin-bottom: 0; }

        .c-icon {
            color: var(--accent-light);
            width: 18px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }

        .lang-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .lang-row:last-child { margin-bottom: 0; border-bottom: none; }

        .lang-name { font-size: 0.88rem; color: #94a3b8; font-weight: 500; }

        .lang-meta {
            font-size: 0.75rem;
            color: var(--accent);
            font-style: italic;
        }

        .pips { display: flex; gap: 4px; }

        .pip {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(101,91,176,0.2);
        }

        .pip.on { background: var(--accent-light); }

        .skill-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .skill-list li {
            font-size: 0.82rem;
            color: #cbd5e1;
            line-height: 1;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .skill-list li:last-child { border-bottom: none; }

        /* ── MAIN ── */
        .main {
            background: var(--white);
            padding: 52px 44px 44px;
        }

        .summary {
            border-left: 3px solid var(--accent);
            padding-left: 20px;
            margin-bottom: 44px;
        }

        .summary p {
            font-style: italic;
            font-weight: 300;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--muted);
        }

        .m-title {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .m-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .m-section { margin-bottom: 38px; }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 22px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 1px;
            background: var(--border);
        }

        .tl-item {
            position: relative;
            margin-bottom: 28px;
        }

        .tl-item:last-child { margin-bottom: 0; }

        .tl-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 7px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 3px var(--white), 0 0 0 4px var(--accent);
        }

        .tl-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 3px;
        }

        .tl-company {
            font-size: 0.67rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .tl-date {
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .tl-role {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 5px;
        }

        .tl-desc {
            font-size: 0.8rem;
            line-height: 1.65;
            color: #475569;
        }

        .subroles {
            margin-top: 14px;
            padding-left: 16px;
            border-left: 2px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .sub-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sub-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .sub-desc {
            font-size: 0.8rem;
            color: #475569;
            line-height: 1.6;
            margin-top: 3px;
        }

        .tl-bullets {
            margin: 6px 0 0;
            padding: 0;
            list-style: none;
        }

        .tl-bullets li {
            font-size: 0.77rem;
            line-height: 1.6;
            color: #475569;
            padding-left: 12px;
            position: relative;
        }

        .tl-bullets li::before {
            content: '–';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: 600;
        }

        .sub-bullets {
            margin: 4px 0 0;
            padding: 0;
            list-style: none;
        }

        .sub-bullets li {
            font-size: 0.73rem;
            line-height: 1.55;
            color: var(--muted);
            padding-left: 10px;
            position: relative;
        }

        .sub-bullets li::before {
            content: '·';
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        .tl-tech {
            font-size: 0.76rem;
            color: var(--muted);
            margin-top: 5px;
            font-style: italic;
        }

        /* Education */
        .edu-item { margin-bottom: 18px; }
        .edu-item:last-child { margin-bottom: 0; }

        .edu-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .edu-school {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .edu-date {
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .edu-degree {
            font-size: 0.78rem;
            color: var(--accent-dim);
            font-weight: 500;
            margin-top: 3px;
        }

        .edu-detail {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 3px;
            line-height: 1.5;
        }

        /* Certifications */
        .cert-item {
            display: flex;
            gap: 18px;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .cert-item:last-child { margin-bottom: 0; }

        .cert-date {
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
            min-width: 60px;
            padding-top: 1px;
        }

        .cert-name {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            line-height: 1.45;
        }

        .cert-issuer {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 2px;
        }

        @media print {
            body { background: white; padding: 0; }
            .page { max-width: 100%; box-shadow: none; }
        }

        @media (max-width: 768px) {
            body { padding: 0; background: var(--dark); }

            .page {
                grid-template-columns: 1fr;
                margin: 0;
                max-width: 100%;
                box-shadow: none;
            }

            .photo-wrap { height: 260px; }

            .identity { padding: 0 24px 24px; }

            .identity h1 { font-size: 1.8rem; }

            .sidebar-body { padding: 4px 24px 36px; }

            .main { padding: 36px 24px 48px; }

            .summary { margin-bottom: 32px; }

            .tl-meta { flex-wrap: wrap; }

            .tl-date { margin-left: 0; margin-top: 2px; width: 100%; }

            .tl-role { font-size: 0.9rem; }

            .m-title { font-size: 1rem; }

            .edu-head { flex-wrap: wrap; }

            .edu-date { margin-left: 0; margin-top: 2px; }
        }
    </style>
</head>
<body>
<div class="page">
    <aside class="sidebar">
        <div class="photo-wrap"><img id="cv-photo" src="" alt=""></div>
        <div class="identity" id="cv-identity"></div>
        <div class="sidebar-body" id="cv-sidebar"></div>
    </aside>
    <main class="main" id="cv-main"></main>
</div>

<script src="cv-data.js"></script>
<script>
(function () {
    const d = CV;

    // ── helpers ────────────────────────────────────────────────
    function e(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function skillList(items) {
        return '<ul class="skill-list">' +
            items.map(i => `<li>${e(i)}</li>`).join('') +
            '</ul>';
    }
    function badgeList(items) {
        return '<ul class="skill-list">' +
            items.map(i =>
                `<li>${e(i.name)}<br><span style="font-size:0.75rem;color:#94a3b8;">${e(i.issuer)} · ${e(i.date)}</span></li>`
            ).join('') + '</ul>';
    }
    const EMAIL_SVG = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 5L8 9.5L14.5 5" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>`;
    const PIN_SVG   = `<svg width="14" height="16" viewBox="0 0 14 16" fill="none"><path d="M7 1C4.24 1 2 3.24 2 6C2 9.75 7 15 7 15C7 15 12 9.75 12 6C12 3.24 9.76 1 7 1Z" stroke="currentColor" stroke-width="1.3"/><circle cx="7" cy="6" r="1.8" stroke="currentColor" stroke-width="1.3"/></svg>`;

    // ── Photo ──────────────────────────────────────────────────
    const img = document.getElementById('cv-photo');
    img.src = d.photo; img.alt = d.name;

    // ── Identity ───────────────────────────────────────────────
    const nameParts = d.name.split(' ');
    document.getElementById('cv-identity').innerHTML =
        `<h1>${nameParts.map(e).join('<br>')}</h1>` +
        `<div class="role">${e(d.role)}</div>`;

    // ── Sidebar ────────────────────────────────────────────────
    let sb = '';

    // Contact
    sb += `<div><div class="s-section-title">Contact</div>
        <div class="contact-row"><span class="c-icon">${EMAIL_SVG}</span><span>${e(d.email)}</span></div>
        <div class="contact-row"><span class="c-icon">${PIN_SVG}</span><span>${e(d.location)}</span></div>
    </div>`;

    // Languages
    sb += `<div><div class="s-section-title">Languages</div>` +
        d.languages.map(l =>
            `<div class="lang-row"><div class="lang-name">${e(l.name)}</div><div class="lang-meta">${e(l.level)}</div></div>`
        ).join('') + '</div>';

    // Key Soft Skills (before Technical)
    sb += `<div><div class="s-section-title">Key Soft Skills</div>${skillList(d.softSkills)}</div>`;

    // Technical Skills
    sb += `<div><div class="s-section-title">Technical Skills</div>${skillList(d.technicalSkills)}</div>`;

    // Certifications
    sb += `<div><div class="s-section-title">Certifications</div>${badgeList(d.certifications)}</div>`;

    // Awards
    sb += `<div><div class="s-section-title">Honors &amp; Awards</div>${badgeList(d.awards)}</div>`;

    document.getElementById('cv-sidebar').innerHTML = sb;

    // ── Main ───────────────────────────────────────────────────
    let main = '';

    // Summary
    main += `<div class="summary"><p>${e(d.summary)}</p></div>`;

    // Experience
    main += `<section class="m-section"><h2 class="m-title">Experience</h2><div class="timeline">`;
    d.experience.forEach(job => {
        main += `<div class="tl-item">
            <div class="tl-meta">
                <div class="tl-company">${e(job.company)} &nbsp;·&nbsp; ${e(job.location)}</div>
                <div class="tl-date">${e(job.dateRange)}</div>
            </div>
            <div class="tl-role">${e(job.role)}</div>
            <div class="tl-desc">${e(job.desc)}</div>`;
        if (job.bullets && job.bullets.length) {
            main += '<ul class="tl-bullets">' + job.bullets.map(b => `<li>${e(b)}</li>`).join('') + '</ul>';
        }
        if (job.subroles && job.subroles.length) {
            main += '<div class="subroles">';
            job.subroles.forEach(sr => {
                main += `<div>
                    <div class="sub-title">${e(sr.title)} &nbsp;<span style="font-weight:400;color:var(--muted);">${e(sr.date)}</span></div>
                    <div class="sub-desc">${e(sr.desc)}</div>
                    ${sr.tech ? `<div class="tl-tech">${e(sr.tech)}</div>` : ''}
                </div>`;
            });
            main += '</div>';
        }
        main += '</div>';
    });
    main += '</div></section>';

    // Education
    main += `<section class="m-section"><h2 class="m-title">Education</h2>`;
    d.education.forEach(edu => {
        main += `<div class="edu-item">
            <div class="edu-head">
                <div class="edu-school">${e(edu.school)}</div>
                <div class="edu-date">${e(edu.date)}</div>
            </div>
            <div class="edu-degree">${e(edu.degree)}</div>
            ${edu.detail ? `<div class="edu-detail">${edu.detail.split('\n').map(e).join('<br>')}</div>` : ''}
        </div>`;
    });
    main += '</section>';

    document.getElementById('cv-main').innerHTML = main;

})();
</script>
</body>
</html>
