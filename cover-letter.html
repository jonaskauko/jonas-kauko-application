<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonas Kauko — Cover Letter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark:   #2d3040;
            --accent: #655bb0;
            --white:  #ffffff;
            --text:   #1a1b2e;
            --muted:  #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sharp Sans Display No1', 'Space Grotesk', Arial, sans-serif;
            background: #e8e7f0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .page {
            max-width: 780px;
            margin: 0 auto;
            background: var(--white);
            box-shadow: 0 24px 80px rgba(0,0,0,0.2);
        }

        /* ── HEADER ── */
        .header {
            background: var(--dark);
            padding: 40px 52px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            gap: 24px;
        }

        .header-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .header-role {
            font-size: 0.7rem;
            font-weight: 600;
            color: #9891bb;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-top: 8px;
        }

        .header-contact {
            text-align: right;
        }

        .header-contact-row {
            font-size: 0.75rem;
            color: #94a3b8;
            line-height: 1.9;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .header-contact-row .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        /* ── ACCENT BAR ── */
        .accent-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--accent), rgba(101,91,176,0.2));
        }

        /* ── BODY ── */
        .letter-body {
            padding: 52px 52px 60px;
        }

        .meta-block {
            margin-bottom: 24px;
        }

        .recipient {
            font-size: 0.85rem;
            color: var(--text);
            line-height: 1.7;
        }

        .recipient strong {
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }

        .letter-date {
            font-size: 0.78rem;
            color: var(--muted);
            padding-top: 3px;
        }

        .subject-line {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text);
            border-left: 3px solid var(--accent);
            padding-left: 16px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .letter-text {
            font-size: 0.9rem;
            line-height: 1.85;
            color: #334155;
        }

        .letter-text p {
            margin-bottom: 1.4em;
        }

        .letter-text p:last-child { margin-bottom: 0; }

        .salutation {
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 28px;
        }

        .signature-block {
            margin-top: 48px;
        }

        .sign-closing {
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 40px;
        }

        .sign-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .sign-title {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ── FOOTER ── */
        .footer {
            background: var(--dark);
            padding: 18px 52px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-text {
            font-size: 0.68rem;
            color: #475569;
            letter-spacing: 0.05em;
        }

        .footer-accent {
            width: 28px;
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
        }

        @media print {
            body { background: white; padding: 0; }
            .page { box-shadow: none; max-width: 100%; }
        }

        @media (max-width: 768px) {
            body { padding: 0; }

            .page { max-width: 100%; box-shadow: none; }

            .header {
                padding: 28px 24px;
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .header-contact { text-align: left; }

            .header-contact-row { justify-content: flex-start; }

            .header-name { font-size: 1.6rem; }

            .letter-body { padding: 32px 24px 44px; }

            .meta-block { flex-direction: column; gap: 8px; }

            .letter-date { padding-top: 0; }

            .footer { padding: 16px 24px; }
        }
    </style>
</head>
<body>
<div class="page">
    <header class="header" id="cl-header"></header>
    <div class="accent-bar"></div>
    <div class="letter-body" id="cl-body"></div>
    <footer class="footer" id="cl-footer"></footer>
</div>

<script src="cover-letter-data.js"></script>
<script>
(function () {
    const d = LETTER;
    function e(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Header
    document.getElementById('cl-header').innerHTML = `
        <div>
            <div class="header-name">${e(d.name)}</div>
            <div class="header-role">${e(d.role)}</div>
        </div>
        <div class="header-contact">
            <div class="header-contact-row"><div class="dot"></div>${e(d.email)}</div>
            <div class="header-contact-row"><div class="dot"></div>${e(d.location)}</div>
        </div>`;

    // Body
    document.getElementById('cl-body').innerHTML = `
        <div class="subject-line">${e(d.subject)}</div>
        <div class="letter-text">
            ${d.paragraphs.map(p => `<p>${e(p)}</p>`).join('')}
        </div>
        <div class="signature-block">
            <div class="sign-closing">${e(d.closing)}</div>
            <div class="sign-name">${e(d.name)}</div>
            <div class="sign-title">${e(d.role)} · Matrix42</div>
        </div>`;

    // Footer
    document.getElementById('cl-footer').innerHTML = `
        <div class="footer-text">${e(d.email)} &nbsp;·&nbsp; ${e(d.location)}</div>
        <div class="footer-accent"></div>`;
})();
</script>
</body>
</html>
