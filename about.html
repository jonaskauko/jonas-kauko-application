<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonas Kauko — About Me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Sharp Sans Display No1', 'Space Grotesk', Arial, sans-serif;
            background: #2d3040;
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        /* ── INTRO ── */
        .intro-section {
            padding: 44px 52px 36px;
            text-align: center;
            flex-shrink: 0;
        }

        .intro-label {
            font-size: 0.62rem;
            font-weight: 700;
            color: #9891bb;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            margin-bottom: 18px;
        }

        .intro-text {
            font-size: 0.92rem;
            color: #94a3b8;
            line-height: 1.85;
            font-weight: 300;
            font-style: italic;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ── PHOTOS ── */
        .photos-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            min-height: 360px;
        }

        .photo-item {
            position: relative;
            overflow: hidden;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            transition: transform 0.5s ease;
        }

        .photo-item:hover img {
            transform: scale(1.03);
        }

        .photo-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 20px 18px;
            background: linear-gradient(to top, rgba(26,27,46,0.75) 0%, transparent 100%);
            font-size: 0.68rem;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            text-transform: uppercase;
            letter-spacing: 0.16em;
        }

        @media (max-width: 600px) {
            .photos-grid { grid-template-columns: 1fr; min-height: auto; }
            .photo-item { min-height: 260px; }
            .intro-section { padding: 32px 24px 28px; }
        }
    </style>
</head>
<body>

<div class="intro-section" id="about-intro"></div>
<div class="photos-grid" id="about-photos"></div>

<script src="about-data.js"></script>
<script>
(function () {
    const d = ABOUT;
    function e(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('about-intro').innerHTML = `
        <div class="intro-label">${e(d.name)} &nbsp;·&nbsp; ${e(d.role)}</div>
        <p class="intro-text">${e(d.intro)}</p>`;

    document.getElementById('about-photos').innerHTML = d.photos.map(p => `
        <div class="photo-item">
            <img src="${e(p.src)}" alt="${e(p.label)}">
            <div class="photo-label">${e(p.label)}</div>
        </div>`).join('');
})();
</script>
</body>
</html>
